# MPi MIP — runtime configuration
# All paths are relative to the project root.
#
# RBI PSI ships in two formats that together span Apr 2004 to present:
#   - Old format: Apr 2004 - Oct 2019 (sheet "Old Format")
#   - New format: Nov 2019 - present  (sheet "New Format")
# The pipeline auto-detects format by sheet name, parses each, and stitches
# them into one continuous series.
#
# Columns are matched by (section + label + unit) substring patterns rather
# than fixed positions. This survives RBI's format change in Nov 2019, where
# every column position moved but the labels stayed recognisable.

[paths]
raw_dir       = "data/raw"
processed_dir = "data/processed"

# ── RBI Payment System Indicators ──────────────────────────────────────────
[rbi_psi]
file_pattern = "*Payment_System*"
date_format  = "%b-%Y"

# --- New format (Nov 2019 onward) ---
[rbi_psi.formats.new]
sheet_match    = "new"     # matched (case-insensitive) against the sheet name
label_row      = 5
unit_row       = 6
data_start_row = 7
date_col       = 1

[rbi_psi.formats.new.columns.credit_cards_outstanding_lakh]
section = ["number of cards"]
column  = ["credit"]
unit    = ["volume"]
[rbi_psi.formats.new.columns.debit_cards_outstanding_lakh]
section = ["number of cards"]
column  = ["debit"]
unit    = ["volume"]
[rbi_psi.formats.new.columns.credit_card_vol_lakh]
section = ["card payments"]
column  = ["credit"]
unit    = ["volume"]
[rbi_psi.formats.new.columns.credit_card_val_cr]
section = ["card payments"]
column  = ["credit"]
unit    = ["value"]
[rbi_psi.formats.new.columns.debit_card_vol_lakh]
section = ["card payments"]
column  = ["debit"]
unit    = ["volume"]
[rbi_psi.formats.new.columns.debit_card_val_cr]
section = ["card payments"]
column  = ["debit"]
unit    = ["value"]

# --- Old format (Apr 2004 - Oct 2019) ---
[rbi_psi.formats.old]
sheet_match    = "old"
label_row      = 3
unit_row       = 4
data_start_row = 5
date_col       = 1

[rbi_psi.formats.old.columns.credit_cards_outstanding_lakh]
section = ["outstanding"]
column  = ["credit"]
unit    = ["volume"]
[rbi_psi.formats.old.columns.debit_cards_outstanding_lakh]
section = ["outstanding"]
column  = ["debit"]
unit    = ["volume"]
[rbi_psi.formats.old.columns.credit_card_vol_lakh]
section     = ["cards"]
section_not = ["outstanding"]
column      = ["credit"]
unit        = ["volume"]
[rbi_psi.formats.old.columns.credit_card_val_cr]
section     = ["cards"]
section_not = ["outstanding"]
column      = ["credit"]
unit        = ["value"]
[rbi_psi.formats.old.columns.debit_card_vol_lakh]
section     = ["cards"]
section_not = ["outstanding"]
column      = ["debit"]
unit        = ["volume"]
[rbi_psi.formats.old.columns.debit_card_val_cr]
section     = ["cards"]
section_not = ["outstanding"]
column      = ["debit"]
unit        = ["value"]

# ── NPCI UPI Product Statistics ────────────────────────────────────────────
[npci_upi]
file_pattern = "Product-Statistics-UPI*"

# ── Data quality thresholds ────────────────────────────────────────────────
[validation]
max_null_pct       = 20.0
max_date_gap_days  = 35
min_rows           = 60

# ── Major Indian card issuers (used in Task 2 per-issuer modelling) ────────
[issuers]
public_sector  = ["SBI", "PNB", "Bank of Baroda", "Canara Bank", "Union Bank"]
private_sector = ["HDFC Bank", "ICICI Bank", "Axis Bank", "Kotak Mahindra Bank", "IndusInd Bank"]
foreign        = ["Citibank", "Standard Chartered", "HSBC"]
small_finance  = ["AU Small Finance Bank", "Equitas SFB"]

# ── Structural events (used as Prophet changepoints in Task 2 / T3) ────────
[[structural_events]]
date      = 2016-11-08
name      = "Demonetisation"
direction = "positive"
notes     = "Cash ban forced rapid digital payment adoption."

[[structural_events]]
date      = 2019-11-01
name      = "PSI format change"
direction = "definitional_break"
notes     = "RBI changed card-payment definitions. Transaction volume series may not be directly comparable across this boundary; cards-outstanding counts are unaffected."

[[structural_events]]
date      = 2020-03-25
name      = "COVID lockdown"
direction = "negative"
notes     = "Sharp drop in in-person transactions for ~4 months."

[[structural_events]]
date      = 2022-01-01
name      = "UPI inflection"
direction = "negative_debit"
notes     = "UPI volumes overtake debit card volumes at point of sale."
